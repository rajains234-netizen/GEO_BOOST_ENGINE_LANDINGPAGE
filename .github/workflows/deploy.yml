script: |
  cd /var/www

  if [ ! -d "html" ]; then
    git clone https://github.com/rajains234-netizen/GEO_BOOST_ENGINE_LANDINGPAGE.git html
  fi

  cd html
  git pull origin main

  cd frontend
  npm install --legacy-peer-deps --force
  npm run build

  sudo rm -rf /var/www/html/*
  sudo cp -r build/* /var/www/html/

  sudo systemctl restart nginx
